<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStore Ultra | Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --glass: rgba(255, 255, 255, 0.7);
            --text-dark: #1e293b;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: linear-gradient(-45deg, #eef2ff, #fdf2f8, #fff7ed, #f0fdf4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-dark);
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .logo { font-size: 1.8rem; font-weight: 800; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .nav-tools { display: flex; gap: 15px; }
        .nav-btn { 
            background: white; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: 0.3s; color: #475569;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--primary); color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; }

        .hero { padding: 40px 5%; text-align: center; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; color: #1e1b4b; }

        .search-container { max-width: 600px; margin: 0 auto 30px; padding: 0 5%; }
        .search-bar { width: 100%; padding: 15px 25px; border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); outline: none; font-size: 16px; }

        .main-container { max-width: 1440px; margin: 0 auto; padding: 0 5%; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        @media (max-width: 1100px) { .main-container { grid-template-columns: 1fr; } }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 30px; padding: 20px; transition: 0.4s; position: relative; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 10px; }
        
        .logic-info { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
        .stock-tag { font-size: 10px; font-weight: 800; color: var(--success); margin-bottom: 4px; }
        .history-tag { font-size: 10px; color: var(--secondary); margin-bottom: 10px; font-style: italic; }

        .price-tag { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .buy-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 700; }

        .cart-panel { background: var(--glass); backdrop-filter: blur(20px); border-radius: 35px; padding: 30px; position: sticky; top: 100px; }
        .qty-ctrl { display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 5px 10px; border-radius: 10px; }
        .qty-btn { border: none; background: none; cursor: pointer; font-weight: 800; color: var(--primary); font-size: 18px; }

        .checkout-btn { width: 100%; padding: 18px; border-radius: 20px; border: none; background: var(--grad); color: white; font-weight: 800; cursor: pointer; margin-top: 20px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; }

        #toast { visibility: hidden; min-width: 200px; background: #1e293b; color: white; text-align: center; border-radius: 20px; padding: 12px; position: fixed; z-index: 4000; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        /* New Tracking Styles */
        .track-container { background: #f8fafc; border-radius: 20px; padding: 20px; margin-top: 15px; border: 1px solid #e2e8f0; }
        .track-bar { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; padding: 0 10px; }
        .track-bar::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background: #cbd5e1; transform: translateY(-50%); z-index: 1; }
        .track-bar-fill { content: ''; position: absolute; top: 50%; left: 0; width: 40%; height: 4px; background: var(--success); transform: translateY(-50%); z-index: 2; transition: 1s; }
        .track-dot { width: 15px; height: 15px; background: white; border: 3px solid #cbd5e1; border-radius: 50%; position: relative; z-index: 3; }
        .track-dot.active { border-color: var(--success); background: var(--success); }
        .track-labels { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: #64748b; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="navigate('home')">MyStore ✨</div>
    <div class="nav-tools">
        <button class="nav-btn active" onclick="navigate('home')" id="nav-home">Home</button>
        <button class="nav-btn" onclick="navigate('shop')" id="nav-shop">Shop</button>
        <button class="nav-btn" onclick="navigate('orders')" id="nav-orders">Orders</button>
        <button class="nav-btn" onclick="openAdmin()"><i class="fas fa-lock"></i></button>
    </div>
</nav>

<div id="homeSection">
    <section class="hero">
        <h1>Innovation.<br><span style="color:var(--primary)">Premium Tech.</span></h1>
        <p style="margin-top:20px; color:#64748b">Browse through our collection of 30+ elite gadgets.</p>
        <button class="checkout-btn" style="max-width:300px; margin-top:30px" onclick="navigate('shop')">Explore Shop</button>
    </section>
</div>

<div id="shopSection" style="display:none">
    <div class="search-container">
        <input type="text" id="productSearch" class="search-bar" placeholder="🔍 Search for products..." onkeyup="filterProducts()">
    </div>
    <div class="main-container">
        <div class="products-grid" id="grid"></div>
        <aside class="cart-panel">
            <h2>Your Basket</h2>
            <div id="cartList" style="margin-top:20px"><p style="color:#94a3b8">Cart is empty...</p></div>
            <div style="border-top: 2px dashed #e2e8f0; margin-top: 20px; padding-top: 20px;">
                <div style="display:flex; justify-content:space-between;"><span>Total</span><span class="price-tag" id="total">₹0.00</span></div>
                <button class="checkout-btn" onclick="openCheckout()">Checkout Now</button>
            </div>
        </aside>
    </div>
</div>

<div id="ordersSection" style="display:none; padding: 5%">
    <h2 style="margin-bottom: 25px;">Track Your Orders 📦</h2>
    <div id="orderList"></div>
</div>

<div id="checkoutModal" class="modal">
    <div class="modal-box">
        <h3>Shipping Details 📦</h3>
        <div class="form-group"><label>Full Name</label><input type="text" id="custName" placeholder="Receiver Name"></div>
        <div class="form-group"><label>Address</label><input type="text" id="custAddr" placeholder="Delivery Address"></div>
        <div class="form-group"><label>Phone</label><input type="number" id="custPhone" placeholder="Mobile Number"></div>
        <div class="form-group">
            <label>Payment</label>
            <select id="custPay"><option>UPI</option><option>Card</option><option>COD</option></select>
        </div>
        <button class="checkout-btn" onclick="processOrder()">Place Order</button>
        <button onclick="closeModal('checkoutModal')" style="width:100%; background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-box" style="max-width:800px; max-height:80vh; overflow-y:auto;">
        <h3>Admin Inventory</h3>
        <table style="width:100%; margin-top:20px; font-size:12px; border-collapse: collapse;">
            <thead><tr style="text-align:left;"><th>Product</th><th>Base Price</th><th>Demand</th><th>Stock</th><th>Action</th></tr></thead>
            <tbody id="adminBody"></tbody>
        </table>
        <button class="checkout-btn" onclick="closeModal('adminModal')">Close Admin</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const items = [
        {id:1, name:"Mouse", price:900, d:50, stock:10, history:"-₹50 last week"},
        {id:2, name:"Keyboard", price:1500, d:75, stock:8, history:"+₹100 last week"},
        {id:3, name:"Monitor", price:12000, d:30, stock:5, history:"Stable"},
        {id:4, name:"Printer", price:3000, d:120, stock:15, history:"+₹200 last week"},
        {id:5, name:"Headphones", price:18000, d:15, stock:4, history:"-₹500 last week"},
        {id:6, name:"Speaker", price:5000, d:95, stock:20, history:"Stable"},
        {id:7, name:"Webcam", price:8000, d:110, stock:12, history:"+₹150 last week"},
        {id:8, name:"Power Bank", price:4000, d:140, stock:30, history:"+₹80 last week"},
        {id:9, name:"Tablet", price:25000, d:200, stock:2, history:"+₹1200 last week"},
        {id:10, name:"Router", price:18000, d:40, stock:6, history:"Stable"},
        {id:11, name:"Hard disk", price:1200, d:60, stock:15, history:"Stable"},
        {id:12, name:"Pen Drive", price:2500, d:85, stock:10, history:"+₹120 last week"},
        {id:13, name:"SSD", price:2000, d:45, stock:14, history:"Stable"},
        {id:14, name:"Camera", price:5500, d:30, stock:7, history:"-₹100 last week"},
        {id:15, name:"Charger", price:9000, d:20, stock:3, history:"Stable"},
        {id:16, name:"Tripod", price:2200, d:70, stock:18, history:"+₹50 last week"},
        {id:17, name:"Smart Watch", price:1800, d:40, stock:25, history:"Stable"},
        {id:18, name:"Earbuds", price:2800, d:55, stock:9, history:"+₹200 last week"},
        {id:19, name:"Microphone", price:3500, d:35, stock:11, history:"Stable"},
        {id:20, name:"Laptop", price:7500, d:95, stock:5, history:"+₹400 last week"},
        {id:21, name:"Graphics Card", price:6500, d:110, stock:4, history:"+₹300 last week"},
        {id:22, name:"CPU", price:1500, d:40, stock:20, history:"Stable"},
        {id:23, name:"Motherboard", price:2800, d:65, stock:13, history:"-₹50 last week"},
        {id:24, name:"RAM 16GB", price:4500, d:25, stock:8, history:"Stable"},
        {id:25, name:"RAM 32GB", price:3200, d:50, stock:16, history:"Stable"},
        {id:26, name:"Gaming Chair", price:1400, d:130, stock:40, history:"+₹150 last week"},
        {id:27, name:"Desk Lamp", price:3000, d:45, stock:12, history:"Stable"},
        {id:28, name:"External SSD", price:1800, d:30, stock:22, history:"-₹20 last week"},
        {id:29, name:"Monitor Stand", price:8500, d:80, stock:6, history:"+₹100 last week"},
        {id:30, name:"HDMI Cable", price:2000, d:55, stock:19, history:"Stable"}
    ];

    let cart = [];
    let orders = [];

    function navigate(p) {
        ['homeSection','shopSection','ordersSection'].forEach(s => document.getElementById(s).style.display='none');
        document.getElementById(p+'Section').style.display='block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-'+p).classList.add('active');
        if(p==='shop') renderItems();
        if(p==='orders') renderOrders();
    }

    function calcPrice(p){

  // 0–100 stable
  if(p.d <= 100){
    return p.price.toFixed(2);
  }

  let demandIncrease = 0;

  // progressive slab calculation
  let remainingDemand = p.d;
  let slabStart = 100; 
  let slabIncrement = 1;

  while(remainingDemand > slabStart){

    let slabEnd = slabStart + 100;

    let unitsInThisSlab =
      Math.min(remainingDemand, slabEnd) - slabStart;

    demandIncrease += unitsInThisSlab * slabIncrement;

    // next slab
    slabStart += 100;
    slabIncrement += 1;
  }

  // volatility
  let volatilityBonus = 0;

  if(p.d % 75 === 0){
    volatilityBonus = 1;
  }

  // time multiplier
  let timeMultiplier = 1;

  let hour = new Date().getHours();

  if(hour >= 18 && hour <= 22){
    timeMultiplier = 1.05;
  }

  let finalPrice =
    (p.price + demandIncrease + volatilityBonus)
    * timeMultiplier;

  return finalPrice.toFixed(2);
}
    function renderItems() {
        const grid = document.getElementById('grid');
        grid.innerHTML = items.map(p => `
            <div class="card">
                <div class="logic-info"><i class="fas fa-fire"></i> Demand: ${p.d}</div>
                <div class="stock-tag"><i class="fas fa-box"></i> ${p.stock} units left</div>
                <div class="history-tag"><i class="fas fa-chart-line"></i> ${p.history}</div>
                <img src="/static/images/p${p.id}.jpg" onerror="this.src='https://via.placeholder.com/150/6366f1/ffffff?text=${p.name}'">
                <h3>${p.name}</h3>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto">
                    <span class="price-tag">₹${calcPrice(p)}</span>
                    <button class="buy-btn" onclick="addToCart(${p.id})">Add</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = items.find(x => x.id === id);
        if(item.stock <= 0) return alert("Sold Out!");
        const inCart = cart.find(c => c.id === id);
        if(inCart) inCart.q++; else cart.push({id: item.id, name: item.name, price: calcPrice(item), q: 1});
        item.d++; item.stock--;
        renderCart(); renderItems(); showToast("Added!");
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        if(!cart.length) { list.innerHTML="<p>Cart is empty...</p>"; document.getElementById('total').innerText="₹0.00"; return; }
        let total = 0;
        list.innerHTML = cart.map(i => {
            total += i.price * i.q;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:15px; background:white; padding:10px; border-radius:15px">
                <div><b>${i.name}</b><br>₹${i.price}</div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="updateQty(${i.id}, -1)">-</button>
                    <span>${i.q}</span>
                    <button class="qty-btn" onclick="updateQty(${i.id}, 1)">+</button>
                </div>
            </div>`;
        }).join('');
        document.getElementById('total').innerText = `₹${total.toFixed(2)}`;
    }

    function updateQty(id, d) {
        const i = cart.find(x => x.id === id);
        const item = items.find(x => x.id === id);
        if(d > 0 && item.stock <= 0) return alert("No stock!");
        i.q += d;
        if(d > 0) { item.stock--; item.d++; } else { item.stock++; }
        if(i.q <= 0) cart = cart.filter(x => x.id !== id);
        renderCart(); renderItems();
    }

    function filterProducts() {
        const query = document.getElementById('productSearch').value.toLowerCase();
        document.querySelectorAll('.card').forEach(card => {
            const name = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = name.includes(query) ? 'flex' : 'none';
        });
    }

    function openCheckout() { if(!cart.length) return; document.getElementById('checkoutModal').style.display='flex'; }
    function closeModal(m) { document.getElementById(m).style.display='none'; }

    function processOrder() {
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddr').value;
        const phone = document.getElementById('custPhone').value;
        const pay = document.getElementById('custPay').value;
        
        if(!name || !addr || !phone) return alert("Please fill all details!");
        
        orders.unshift({ 
            id: "#ORD-"+Math.floor(Math.random()*90000), 
            name: name, 
            addr: addr,
            phone: phone,
            pay: pay,
            total: document.getElementById('total').innerText, 
            date: new Date().toLocaleString(),
            items: cart.map(i => i.name).join(', ')
        });
        
        cart = []; renderCart(); closeModal('checkoutModal');
        navigate('orders');
        showToast("Order Placed!");
    }

    function renderOrders() {
        const list = document.getElementById('orderList');
        if(orders.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:#64748b; margin-top:50px;">No orders found.</p>`;
            return;
        }
        list.innerHTML = orders.map(o => `
            <div style="background:white; padding:25px; border-radius:30px; margin-bottom:20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
                <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:15px;">
                    <div>
                        <b style="font-size:18px;">${o.id}</b><br>
                        <span style="font-size:12px; color:#94a3b8;">Ordered on: ${o.date}</span>
                    </div>
                    <span style="background:var(--success); color:white; padding:5px 15px; border-radius:20px; font-size:12px; font-weight:700;">ACTIVE</span>
                </div>
                <p style="font-size:14px; margin-bottom:5px;"><b>Items:</b> ${o.items}</p>
                <p style="font-size:14px; margin-bottom:5px;"><b>Delivery To:</b> ${o.name}, ${o.addr}</p>
                <p style="font-size:14px; margin-bottom:15px;"><b>Paid:</b> ${o.total} via ${o.pay}</p>
                
                <div class="track-container">
                    <div class="track-bar">
                        <div class="track-bar-fill"></div>
                        <div class="track-dot active"></div>
                        <div class="track-dot active"></div>
                        <div class="track-dot"></div>
                        <div class="track-dot"></div>
                    </div>
                    <div class="track-labels">
                        <span>PLACED</span>
                        <span>SHIPPED</span>
                        <span>OUT FOR DELIVERY</span>
                        <span>DELIVERED</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openAdmin() {
        if(prompt("PIN") !== "admin123") return;
        document.getElementById('adminModal').style.display='flex';
        const body = document.getElementById('adminBody');
        body.innerHTML = items.map(p => `
            <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">${p.name}</td>
                <td><input type="number" id="adm-prc-${p.id}" value="${p.price}" style="width: 80px; padding: 5px;"></td>
                <td><input type="number" id="adm-dem-${p.id}" value="${p.d}" style="width: 50px; padding: 5px;"></td>
                <td><input type="number" id="adm-stk-${p.id}" value="${p.stock}" style="width: 50px; padding: 5px;"></td>
                <td>
<button onclick="saveAdminChanges(${p.id})" 
style="padding: 5px 10px; background: var(--success); color: white; border: none; border-radius: 5px; cursor: pointer;">
OK
</button>
</td>
</tr>
`).join("");
}

function saveAdminChanges(id) {
    const p = items.find(x => x.id === id);

    p.price = parseFloat(document.getElementById(`adm-prc-${id}`).value);
    p.d = parseInt(document.getElementById(`adm-dem-${id}`).value);
    p.stock = parseInt(document.getElementById(`adm-stk-${id}`).value);

    renderItems();
    showToast(`Updated ${p.name}`);
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m;
    t.className = "show";
    setTimeout(() => t.className = "", 2000);
}

renderItems();
</script>
</body>
</html>
